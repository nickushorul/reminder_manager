create:
  name: "Create Reminder"
  description: "Creeaza un reminder nou."
  fields:
    title:
      name: "Titlu"
      description: "Nume reminder"
      required: true
      selector:
        text:
    message:
      name: "Mesaj"
      description: "Mesaj notificare"
      required: true
      selector:
        text:
    target_time:
      name: "Target Time"
      description: "Data si ora limita"
      required: false
      selector:
        text:
    repeat:
      name: "Repetare"
      description: "Seteaza monthly pentru un reminder lunar fix sau none pentru reminder unic."
      required: false
      default: "none"
      selector:
        select:
          options:
            - "none"
            - "monthly"
    duration_minutes:
      name: "Durata in minute"
      description: "Peste cate minute (ignorat daca exista target_time)"
      required: false
      selector:
        number:
          min: 0
          max: 1440
    target_user_ids:
      name: "User IDs"
      description: "Lista userilor Home Assistant care primesc reminderul in panel."
      required: false
      selector:
        object:
    notify_targets:
      name: "Notify targets"
      description: "Lista serviciilor notify.* pentru dispozitivele care primesc notificarea."
      required: false
      selector:
        object:
    notify_mobile:
      name: "Notificare telefon"
      description: "Activeaza trimiterea catre serviciile notify selectate."
      required: false
      default: true
      selector:
        boolean:
    notify_persistent:
      name: "Notificare Home Assistant"
      description: "Creeaza o notificare persistenta globala in Home Assistant."
      required: false
      default: true
      selector:
        boolean:
update:
  name: "Update Reminder"
  description: "Actualizeaza un reminder existent."
  fields:
    id:
      name: "ID"
      description: "ID reminder"
      required: true
      selector:
        text:
    updates:
      name: "Updates"
      description: "Campuri partiale de actualizat, inclusiv repeat, target_user_ids sau notify_targets."
      required: true
      selector:
        object:
delete:
  name: "Delete Reminder"
  description: "Sterge un reminder."
  fields:
    id:
      name: "ID"
      description: "ID reminder"
      required: true
      selector:
        text:
done:
  name: "Mark Done"
  description: "Marcheaza reminderul ca finalizat."
  fields:
    id:
      name: "ID"
      description: "ID reminder"
      required: true
      selector:
        text:
snooze:
  name: "Snooze Reminder"
  description: "Amana reminderul."
  fields:
    id:
      name: "ID"
      description: "ID reminder"
      required: true
      selector:
        text:
    minutes:
      name: "Minute"
      description: "Cate minute amani?"
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 10000
